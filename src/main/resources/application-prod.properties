# Perfil de PRODUÇÃO. Ativado quando SPRING_PROFILES_ACTIVE=prod (definido na Railway).
# Sobrepõe o application.properties (que é o padrão/local com H2).
#
# A conexão com o PostgreSQL vem de VARIÁVEIS DE AMBIENTE que a Railway injeta
# a partir do banco (ver o guia de deploy). Não há segredo no código.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate cria/atualiza as tabelas a partir das @Entity (ok para este projeto;
# em sistemas grandes usa-se 'validate' + migrações com Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Em produção não poluímos o log com SQL nem expomos o console do H2.
spring.jpa.show-sql=false
spring.h2.console.enabled=false
