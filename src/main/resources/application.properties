# Arquivo central de CONFIGURAÇÃO (perfil padrão = desenvolvimento LOCAL com H2).
spring.application.name=xadrez

# Porta: usa a variável PORT se existir (a Railway define isso em produção),
# senão cai em 8080 (local). Sintaxe ${VAR:padrao}.
server.port=${PORT:8080}

# ----- Banco de dados H2 (em memória) — só no LOCAL -----
# jdbc:h2:mem:xadrez = banco "xadrez" que vive na MEMÓRIA (some quando a app para).
# (Removemos driver-class-name: o Spring infere o driver a partir da URL.)
spring.datasource.url=jdbc:h2:mem:xadrez
spring.datasource.username=sa
spring.datasource.password=

# ----- JPA / Hibernate -----
# ddl-auto=update: o Hibernate CRIA/atualiza as tabelas a partir das @Entity.
#   Ótimo para desenvolver. (Em produção, normalmente se usa 'validate' + migrações.)
spring.jpa.hibernate.ddl-auto=update
# Mostra no console o SQL que o Hibernate gera — ótimo para APRENDER o que acontece.
spring.jpa.show-sql=true
# Formata o SQL para ficar legível.
spring.jpa.properties.hibernate.format_sql=true

# ----- Console web do H2 -----
# Habilita uma telinha em http://localhost:8080/h2-console para inspecionar o banco.
spring.h2.console.enabled=true
